[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
# resolc_compile = true enables PVM output via the Revive compiler.
# resolc must be on $PATH (installed at ~/.cargo/bin/resolc).
resolc_compile = true

[rpc_endpoints]
polkadot-testnet = "https://eth-rpc-testnet.polkadot.io/"

[etherscan]
polkadot-testnet = { key = "", url = "https://blockscout-testnet.polkadot.io/api?" }
