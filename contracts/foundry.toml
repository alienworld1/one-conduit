[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"

[profile.default.polkadot]
# Enable Revive compiler for PVM output.
# `resolc` must be on $PATH. See docs/SETUP.md for install steps.
resolc_compile = true

[rpc_endpoints]
polkadot-testnet = "https://testnet-passet-hub-eth-rpc.polkadot.io"

[etherscan]
polkadot-testnet = { key = "", url = "https://blockscout-testnet.polkadot.io/api?" }
